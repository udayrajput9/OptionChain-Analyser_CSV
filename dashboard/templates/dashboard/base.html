<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Brain Trading Terminal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1015; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a1a24; border-bottom: 1px solid #333; }
        .card { background-color: #1a1a24; border: 1px solid #333;  }
        
        .outcome-perfect { background: rgba(0,200,83,0.12); border: 1px solid #00c853; }
        .outcome-partial { background: rgba(255,215,64,0.12); border: 1px solid #ffd740; }
        .outcome-wrong { background: rgba(213,0,0,0.12); border: 1px solid #d50000; }
    </style>
    <!-- Pre-load Plotly and ChartJS -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand text-primary fw-bold" href="{% url 'index' %}">📈 SUPER BRAIN TERMINAL</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbars">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbars">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'upload' %}">Input Forms</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid">
    {% if messages %}
    <div class="mb-3">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags|default:'info' }}{% endif %} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
